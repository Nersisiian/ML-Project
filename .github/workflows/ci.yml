name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn numpy pandas lightgbm pytest
      - name: Run all tests
        run: |
          pytest tests/simple_test.py tests/full_test.py tests/complete_test.py -v
      - name: Count tests
        run: |
          echo "✅ All tests passed!"
