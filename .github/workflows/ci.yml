name: CI Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install pytest
    - name: Run CI tests
      run: pytest tests/simple/test_ci.py -v
    - name: Success
      run: echo "✅ CI passed!"
