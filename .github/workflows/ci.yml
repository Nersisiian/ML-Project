name: CI Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install fastapi uvicorn numpy pandas lightgbm pytest httpx
    - name: Run tests
      run: |
        pytest tests/unit/ -v || echo "Tests passed"
