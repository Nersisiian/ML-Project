name: CD Staging

on:
  push:
    branches: [develop]
    paths:
      - 'app/**'
      - 'ml/**'
      - 'docker/**'

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and tag API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: real-estate-api-staging
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile.api -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
      - name: Deploy to Kubernetes
        run: |
          aws eks update-kubeconfig --name real-estate-staging --region us-west-2
          kubectl set image deployment/api api=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -n staging
          kubectl rollout status deployment/api -n staging --timeout=5m
      
      - name: Run smoke tests
        run: |
          kubectl port-forward service/api 8000:8000 -n staging &
          sleep 10
          curl -f http://localhost:8000/api/v1/health || exit 1