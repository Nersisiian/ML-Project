# .github/workflows/cd-production.yml
name: CD Production

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'ml/**'
      - 'docker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Build and tag API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: real-estate-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f docker/Dockerfile.api -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
      
      - name: Update Kubernetes deployment
        run: |
          aws eks update-kubeconfig --name real-estate-prod --region us-west-2
          kubectl set image deployment/api api=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -n production
          kubectl rollout status deployment/api -n production --timeout=5m
      
      - name: Run smoke tests
        run: |
          kubectl port-forward service/api 8000:8000 -n production &
          sleep 10
          curl -f http://localhost:8000/api/v1/health
          python scripts/smoke_test.py --endpoint http://localhost:8000
      
      - name: Promote model to production
        run: |
          mlflow --tracking-uri http://mlflow.prod:5000 models transition-stage \
            --name real_estate_predictor \
            --version ${{ github.sha }} \
            --stage Production
      
      - name: Notify deployment status
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: '#deployments'
          slack-message: "Deployment to production completed successfully! SHA: ${{ github.sha }}"
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}