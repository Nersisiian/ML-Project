# docker/docker-compose.yml
version: '3.8'

services:
  # PostgreSQL for metadata
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ml-network
    deploy:
      resources:
        limits:
          memory: 1G

  # Redis for caching
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ml-network
    deploy:
      resources:
        limits:
          memory: 2G

  # MinIO for artifact storage (S3 alternative)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ml-network

  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:${POSTGRES_PASSWORD}@postgres/mlflow
      --default-artifact-root s3://mlflow-artifacts/
    depends_on:
      - postgres
      - minio
    ports:
      - "5000:5000"
    networks:
      - ml-network

  # Feast Feature Store
  feast:
    build:
      context: .
      dockerfile: docker/Dockerfile.feast
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FEAST_REDIS_HOST: redis
    depends_on:
      - redis
      - postgres
    networks:
      - ml-network

  # API Service
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://mlflow:${POSTGRES_PASSWORD}@postgres/mlflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_BUCKET: s3://models/
    depends_on:
      - redis
      - mlflow
      - feast
    ports:
      - "8000:8000"
    networks:
      - ml-network
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
      restart_policy:
        condition: any

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - ml-network
    deploy:
      replicas: 2

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    networks:
      - ml-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - ml-network
    depends_on:
      - prometheus

  # Training Job (runs on schedule)
  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trainer
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FEAST_REDIS_HOST: redis
    volumes:
      - ./models:/app/models
    networks:
      - ml-network
    deploy:
      mode: replicated
      replicas: 0  # Scale to 1 when needed

networks:
  ml-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data: